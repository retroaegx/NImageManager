<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title data-i18n="optionsPageTitle">NIM Extension Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <main class="page">
    <section class="card">
      <h1 data-i18n="optionsHeading">NIM Extension Settings</h1>
      <p class="note" data-i18n="optionsNote">NovelAI 上の拡張から、NIM 転送とオーバーレイ表示の両方で使う設定です。</p>

      <label class="field">
        <span data-i18n="domainLabel">Domain</span>
        <input id="baseUrl" type="text" placeholder="https://nim.example.com" data-i18n-placeholder="domainPlaceholder">
        <small data-i18n="domainHelp">NIM のドメイン。API パスは不要です。</small>
      </label>

      <div class="row">
        <button id="saveConfig" type="button" data-i18n="saveSettings">設定を保存</button>
        <button id="checkSession" type="button" class="secondary" data-i18n="checkSession">セッション確認</button>
        <button id="openLoginPage" type="button" class="secondary" data-i18n="openLoginPage">ログインページを開く</button>
        <button id="openOverlayPage" type="button" class="secondary" data-i18n="openNim">NIM を開く</button>
      </div>
    </section>


    <section class="card">
      <div class="sectionHeader">
        <div>
          <h2 data-i18n="behaviorSection">Behavior</h2>
          <p class="sectionNote" data-i18n="behaviorAutoSaveNote">Changes in this section are saved immediately.</p>
        </div>
        <strong id="behaviorState" class="statusPill idle isHidden" aria-live="polite"></strong>
      </div>
      <label class="toggleField">
        <span class="toggleText">
          <span data-i18n="showNovelAiMenuLabel">Show NIM menu on NovelAI</span>
          <small data-i18n="showNovelAiMenuHelp">When enabled, show the NIM launcher button at the top left of NovelAI.</small>
        </span>
        <input id="showNovelAiMenu" type="checkbox" role="switch">
      </label>
      <label class="toggleField">
        <span class="toggleText">
          <span data-i18n="autoTransferLabel">Auto transfer</span>
          <small data-i18n="autoTransferHelp">When enabled, generated images are transferred to NIM automatically without pressing the button.</small>
        </span>
        <input id="autoTransfer" type="checkbox" role="switch">
      </label>
    </section>

    <section class="card">
      <h2 data-i18n="loginSection">Login</h2>
      <label class="field">
        <span data-i18n="usernameLabel">Username</span>
        <input id="username" type="text" autocomplete="username">
      </label>
      <label class="field">
        <span data-i18n="passwordLabel">Password</span>
        <input id="password" type="password" autocomplete="current-password">
      </label>
      <div class="row">
        <button id="login" type="button" data-i18n="loginButton">Login</button>
        <button id="logout" type="button" class="secondary" data-i18n="logoutButton">Logout</button>
      </div>
    </section>

    <section class="card">
      <h2 data-i18n="statusSection">Status</h2>
      <div class="statusList">
        <div class="statusRow">
          <span data-i18n="settingsStatusLabel">Settings</span>
          <strong id="saveState" class="statusPill idle">Not saved</strong>
        </div>
        <div class="statusRow">
          <span data-i18n="overlayStatusLabel">Overlay</span>
          <strong id="overlayState" class="statusPill idle">Not configured</strong>
        </div>
        <div class="statusRow">
          <span data-i18n="loginStatusLabel">Login</span>
          <strong id="loginState" class="statusPill idle">Not logged in</strong>
        </div>
      </div>
    </section>
  </main>
  <script src="options.js"></script>
</body>
</html>
