<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NIM Transfer Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <main class="page">
    <section class="card">
      <h1>NIM Transfer Settings</h1>
      <p class="note">Enter the NIM domain only. Do not enter the full API path.</p>

      <label class="field">
        <span>Domain</span>
        <input id="baseUrl" type="text" placeholder="https://nim.example.com">
      </label>

      <div class="row">
        <button id="saveBaseUrl" type="button">Save domain</button>
        <button id="checkSession" type="button" class="secondary">Check session</button>
        <button id="openLoginPage" type="button" class="secondary">Open login page</button>
      </div>
    </section>

    <section class="card">
      <h2>Login</h2>
      <label class="field">
        <span>Username</span>
        <input id="username" type="text" autocomplete="username">
      </label>
      <label class="field">
        <span>Password</span>
        <input id="password" type="password" autocomplete="current-password">
      </label>
      <div class="row">
        <button id="login" type="button">Login</button>
        <button id="logout" type="button" class="secondary">Logout</button>
      </div>
    </section>

    <section class="card">
      <h2>Status</h2>
      <div class="statusList">
        <div class="statusRow">
          <span>Settings</span>
          <strong id="saveState" class="statusPill idle">Not saved</strong>
        </div>
        <div class="statusRow">
          <span>Login</span>
          <strong id="loginState" class="statusPill idle">Not logged in</strong>
        </div>
      </div>
    </section>
  </main>
  <script src="options.js"></script>
</body>
</html>
