<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Set Password - NIM</title>
  <link rel="stylesheet" href="/styles.css?v=41" />
</head>
<body class="loginPage">
  <div class="bg"></div>
  <div class="loginShell">
    <div class="card loginCard">
      <div class="loginBrandRow">
        <div class="loginMark">
          <svg class="logo" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 2c3.2 0 5.9 1.8 7.2 4.4.4.8 0 1.7-.9 2.1l-2.6 1.2c-.8.4-1.7 0-2.1-.9C13 7.8 12.1 7.2 12 7.2c-1.5 0-2.8 1.3-2.8 2.8v1.2h1.6c.9 0 1.6.7 1.6 1.6v2.4c0 .9-.7 1.6-1.6 1.6H9.2V20c0 1.1-.9 2-2 2H6c-1.1 0-2-.9-2-2v-6.4c0-3.8 0-4.1.1-4.6C4.6 5.1 8 2 12 2Z" fill="currentColor" opacity=".92"/>
            <path d="M20 12.2v6.2c0 1.1-.9 2-2 2h-6.1c-.9 0-1.6-.7-1.6-1.6v-2.4c0-.9.7-1.6 1.6-1.6h3.2v-2.6c0-.9.7-1.6 1.6-1.6h1.7c.9 0 1.6.7 1.6 1.6Z" fill="currentColor" opacity=".65"/>
          </svg>
        </div>
        <div class="loginBrandTxt">
          <div class="loginTitle">NIM</div>
          <div class="loginSub">パスワード設定</div>
        </div>
      </div>

      <h2 class="loginH" id="pwTitle">パスワードを設定</h2>
      <div class="field">
        <label>対象ユーザー</label>
        <input id="pwUser" disabled />
      </div>

      <div class="field">
        <label>新しいパスワード</label>
        <input id="pwPass" type="password" autocomplete="new-password" placeholder="password" />
      </div>
      <div class="field">
        <label>新しいパスワード（確認）</label>
        <input id="pwPass2" type="password" autocomplete="new-password" placeholder="password" />
      </div>

      <div class="row" style="align-items:center; justify-content:space-between; gap:10px">
        <button id="pwBtn" class="primaryBtn" style="min-width:180px">設定</button>
        <span id="pwErr" class="err"></span>
      </div>

      <div id="pwOk" class="small" style="margin-top:10px; display:none">
        設定しました。<a href="/login.html">ログインへ</a>
      </div>
    </div>
  </div>

  <script src="/set-password.js"></script>
</body>
</html>
