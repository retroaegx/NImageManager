<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin - NIM</title>
  <link rel="stylesheet" href="/styles.css?v=45" />
</head>
<body class="pageAdmin">
  <div class="bg"></div>

  <div class="app">
    <header class="topbar">
      <div class="topbarInner">
      <div class="brand" style="cursor:pointer" onclick="location.assign('/')">
        <svg class="logo" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 2c3.2 0 5.9 1.8 7.2 4.4.4.8 0 1.7-.9 2.1l-2.6 1.2c-.8.4-1.7 0-2.1-.9C13 7.8 12.1 7.2 12 7.2c-1.5 0-2.8 1.3-2.8 2.8v1.2h1.6c.9 0 1.6.7 1.6 1.6v2.4c0 .9-.7 1.6-1.6 1.6H9.2V20c0 1.1-.9 2-2 2H6c-1.1 0-2-.9-2-2v-6.4c0-3.8 0-4.1.1-4.6C4.6 5.1 8 2 12 2Z" fill="currentColor" opacity=".92"/>
          <path d="M20 12.2v6.2c0 1.1-.9 2-2 2h-6.1c-.9 0-1.6-.7-1.6-1.6v-2.4c0-.9.7-1.6 1.6-1.6h3.2v-2.6c0-.9.7-1.6 1.6-1.6h1.7c.9 0 1.6.7 1.6 1.6Z" fill="currentColor" opacity=".65"/>
        </svg>
        <div class="brandText">
          <div class="brandTitle">NIM</div>
        </div>
      </div>

      <nav class="menu" aria-label="main">
        <button class="tab" onclick="location.assign('/')"><span>戻る</span><i class="tabGlow"></i></button>
        <button class="tab active"><span>アカウント管理</span><i class="tabGlow"></i></button>
      </nav>

      <div class="right">
        <div class="userBox">
          <span id="meLabel" class="me"></span>
        </div>

        <button id="hamburger" class="iconBtn" title="メニュー" aria-label="メニュー">
          <span class="icon">☰</span>
        </button>

        <div id="userMenu" class="menuPopup hidden" role="menu" aria-label="ユーザーメニュー">
          <button id="menuAdmin" class="menuItem hidden" role="menuitem">アカウント管理</button>
          <button id="menuMaintenance" class="menuItem hidden" role="menuitem">メンテナンス</button>
          <button id="menuSettings" class="menuItem" role="menuitem">個人設定</button>
          <button id="menuPwLink" class="menuItem" role="menuitem">パスワード変更</button>
          <button id="menuLogout" class="menuItem" role="menuitem">ログアウト</button>
        </div>
      </div>
      </div>
    </header>

    <main class="main shell">
      <section class="panel">
        <div class="card">
          <div class="panelTitleRow">
            <h2>ユーザー</h2>
            <div class="small"></div>
          </div>

          <div class="adminGrid">
            <div class="adminCard">
              <h3>作成（URL発行）</h3>
              <div class="field">
                <label>ユーザー名</label>
                <input id="newUserName" autocomplete="off" />
              </div>
              <div class="field">
                <label>権限</label>
                <select id="newUserRole">
                  <option value="user">user</option>
                  <option value="admin">admin</option>
                </select>
              </div>
              <div class="row" style="justify-content:space-between; gap:10px">
                <button id="createUserBtn" class="primaryBtn" style="min-width:180px">作成してURL発行</button>
                <span id="createErr" class="err"></span>
              </div>

              <div id="issuedBox" class="field" style="margin-top:12px; display:none">
                <label>発行URL</label>
                <div class="row" style="gap:10px">
                  <input id="issuedUrl" readonly />
                  <button id="copyIssuedBtn" class="ghostBtn" style="min-width:120px">コピー</button>
                </div>
              </div>
            </div>

            <div class="adminCard adminGrow">
              <h3>一覧</h3>
              <div class="adminTableWrap">
                <table class="adminTable">
                  <thead>
                    <tr>
                      <th>ユーザー名</th>
                      <th>権限</th>
                      <th>状態</th>
                      <th>無効</th>
                      <th>作成日</th>
                      <th></th>
                    </tr>
                  </thead>
                  <tbody id="userTbody"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="/admin.js?v=42"></script>
</body>
</html>
