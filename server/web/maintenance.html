<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Maintenance - NIM</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="bg"></div>

  <div class="app">
    <header class="topbar">
      <div class="brand" style="cursor:pointer" onclick="location.assign('/')">
        <svg class="logo" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 2c3.2 0 5.9 1.8 7.2 4.4.4.8 0 1.7-.9 2.1l-2.6 1.2c-.8.4-1.7 0-2.1-.9C13 7.8 12.1 7.2 12 7.2c-1.5 0-2.8 1.3-2.8 2.8v1.2h1.6c.9 0 1.6.7 1.6 1.6v2.4c0 .9-.7 1.6-1.6 1.6H9.2V20c0 1.1-.9 2-2 2H6c-1.1 0-2-.9-2-2v-6.4c0-3.8 0-4.1.1-4.6C4.6 5.1 8 2 12 2Z" fill="currentColor" opacity=".92"/>
          <path d="M20 12.2v6.2c0 1.1-.9 2-2 2h-6.1c-.9 0-1.6-.7-1.6-1.6v-2.4c0-.9.7-1.6 1.6-1.6h3.2v-2.6c0-.9.7-1.6 1.6-1.6h1.7c.9 0 1.6.7 1.6 1.6Z" fill="currentColor" opacity=".65"/>
        </svg>
        <div class="brandText">
          <div class="brandTitle">NIM</div>
        </div>
      </div>

      <nav class="menu" aria-label="main">
        <button id="navToPreview" class="tab"><span>プレビュー管理</span><i class="tabGlow"></i></button>
        <button id="navToUpload" class="tab"><span>アップロード管理</span><i class="tabGlow"></i></button>
        <button class="tab active"><span>メンテナンス</span><i class="tabGlow"></i></button>
      </nav>

      <div class="right">
        <div class="userBox">
          <span id="meLabel" class="me"></span>
        </div>

        <button id="hamburger" class="iconBtn" title="メニュー" aria-label="メニュー">
          <span class="icon">☰</span>
        </button>

        <div id="userMenu" class="menuPopup hidden" role="menu" aria-label="ユーザーメニュー">
          <button id="menuAdmin" class="menuItem" role="menuitem">アカウント管理</button>
          <button id="menuMaintenance" class="menuItem" role="menuitem">メンテナンス</button>
          <button id="menuPwLink" class="menuItem" role="menuitem">パスワード変更</button>
          <button id="menuLogout" class="menuItem" role="menuitem">ログアウト</button>
        </div>
      </div>
    </header>

    <main class="main">
      <section class="panel">
        <div class="card">
          <div class="panelTitleRow">
            <h2>メンテナンス</h2>
            <div class="small">再解析は全件対象・50件ずつ・バックグラウンドで進みます。</div>
          </div>

          <div class="adminGrid">
            <div class="adminCard">
              <h3>再解析</h3>
              <div id="reparseSummary" class="maintSummary"></div>

              <div class="row" style="gap:10px; align-items:center; flex-wrap:wrap">
                <button id="startReparseBtn" class="primaryBtn" style="min-width:240px">再解析（全件）</button>
                <span id="reparseErr" class="err"></span>
              </div>
              <div id="reparseLockReason" class="small maintHint"></div>

              <div class="maintStateBox">
                <div class="maintStateRow">
                  <div class="maintStateLabel">状態</div>
                  <div id="reparseStatus" class="maintStateValue"></div>
                </div>

                <div class="maintProgress">
                  <div id="reparseProgressFill" class="maintProgressFill"></div>
                </div>
                <div id="reparseProgressText" class="small maintHint"></div>

                <div class="maintKvGrid">
                  <div class="maintKv"><span class="k">開始</span><span id="reparseStarted"></span></div>
                  <div class="maintKv"><span class="k">最終更新</span><span id="reparseUpdated"></span></div>
                  <div class="maintKv"><span class="k">処理</span><span id="reparseCounts"></span></div>
                  <div class="maintKv"><span class="k">カーソル</span><span id="reparseCursor"></span></div>
                  <div class="maintKv"><span class="k">skip</span><span id="reparseSkip"></span></div>
                  <div class="maintKv"><span class="k">heartbeat</span><span id="reparseHeartbeat"></span></div>
                </div>
              </div>

              <div class="field" style="margin-top:14px">
                <label>履歴（直近5回）</label>
                <div id="reparseHistory" class="maintHistory"></div>
              </div>

              <div style="height:14px"></div>
              <h3 style="margin-top:0">統計</h3>
              <div id="rebuildSummary" class="maintSummary"></div>

              <div class="row" style="gap:10px; align-items:center; flex-wrap:wrap">
                <button id="startRebuildBtn" class="ghostBtn" style="min-width:240px">統計再集計</button>
                <span id="rebuildErr" class="err"></span>
              </div>
              <div id="rebuildLockReason" class="small maintHint"></div>

              <div class="maintStateBox">
                <div class="maintStateRow">
                  <div class="maintStateLabel">状態</div>
                  <div id="rebuildStatus" class="maintStateValue"></div>
                </div>

                <div class="maintProgress">
                  <div id="rebuildProgressFill" class="maintProgressFill"></div>
                </div>
                <div id="rebuildProgressText" class="small maintHint"></div>

                <div class="maintKvGrid">
                  <div class="maintKv"><span class="k">開始</span><span id="rebuildStarted"></span></div>
                  <div class="maintKv"><span class="k">最終更新</span><span id="rebuildUpdated"></span></div>
                  <div class="maintKv"><span class="k">処理</span><span id="rebuildCounts"></span></div>
                  <div class="maintKv"><span class="k">heartbeat</span><span id="rebuildHeartbeat"></span></div>
                </div>
              </div>

              <div class="field" style="margin-top:14px">
                <label>履歴（直近5回）</label>
                <div id="rebuildHistory" class="maintHistory"></div>
              </div>
            </div>

            <div class="adminCard adminGrow">
              <h3 style="margin-top:0">失敗一覧（最新100件） <span id="reparseSkippedLabel" class="small" style="opacity:.85"></span></h3>
              <div class="adminTableWrap">
                <table class="adminTable">
                  <thead>
                    <tr>
                      <th style="width:110px">image_id</th>
                      <th>error</th>
                      <th style="width:160px">time</th>
                      <th style="width:220px">操作</th>
                    </tr>
                  </thead>
                  <tbody id="reparseErrTbody"></tbody>
                </table>
              </div>
            </div>
          </div>

        </div>
      </section>
    </main>
  </div>

  <script type="module" src="/maintenance.js"></script>
</body>
</html>
