<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title data-i18n="page.maintenance.title">Maintenance - NIM</title>
  <link rel="stylesheet" href="/styles.css?v=45" />
</head>
<body class="pageMaintenance">
  <div class="bg"></div>

  <div class="app">
    <header class="topbar">
      <div class="topbarInner">
      <div class="brand" style="cursor:pointer" onclick="location.assign('/')">
        <svg class="logo" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 2c3.2 0 5.9 1.8 7.2 4.4.4.8 0 1.7-.9 2.1l-2.6 1.2c-.8.4-1.7 0-2.1-.9C13 7.8 12.1 7.2 12 7.2c-1.5 0-2.8 1.3-2.8 2.8v1.2h1.6c.9 0 1.6.7 1.6 1.6v2.4c0 .9-.7 1.6-1.6 1.6H9.2V20c0 1.1-.9 2-2 2H6c-1.1 0-2-.9-2-2v-6.4c0-3.8 0-4.1.1-4.6C4.6 5.1 8 2 12 2Z" fill="currentColor" opacity=".92"/>
          <path d="M20 12.2v6.2c0 1.1-.9 2-2 2h-6.1c-.9 0-1.6-.7-1.6-1.6v-2.4c0-.9.7-1.6 1.6-1.6h3.2v-2.6c0-.9.7-1.6 1.6-1.6h1.7c.9 0 1.6.7 1.6 1.6Z" fill="currentColor" opacity=".65"/>
        </svg>
        <div class="brandText">
          <div class="brandTitle">NIM</div>
        </div>
      </div>

      <nav class="menu" aria-label="main">
        <button class="tab" onclick="location.assign('/')"><span data-i18n="common.back">戻る</span><i class="tabGlow"></i></button>
        <button class="tab active"><span data-i18n="menu.maintenance">メンテナンス</span><i class="tabGlow"></i></button>
      </nav>

      <div class="right">
        <div class="userBox">
          <span id="meLabel" class="me"></span>
        </div>

        <button id="hamburger" class="iconBtn" data-i18n-title="menu.title" data-i18n-aria-label="menu.title">
          <span class="icon">☰</span>
        </button>

        <div id="userMenu" class="menuPopup hidden" role="menu" data-i18n-aria-label="menu.user">
          <button id="menuAdmin" class="menuItem hidden" role="menuitem" data-i18n="menu.admin">アカウント管理</button>
          <button id="menuMaintenance" class="menuItem hidden" role="menuitem" data-i18n="menu.maintenance">メンテナンス</button>
          <button id="menuSettings" class="menuItem" role="menuitem" data-i18n="menu.settings">個人設定</button>
          <button id="menuPwLink" class="menuItem" role="menuitem" data-i18n="menu.password">パスワード変更</button>
          <button id="menuLogout" class="menuItem" role="menuitem" data-i18n="menu.logout">ログアウト</button>
        </div>
      </div>
      </div>
    </header>

    <main class="main shell">
      <section class="panel">
        <div class="card">
          <div class="panelTitleRow">
            <h2 data-i18n="menu.maintenance">メンテナンス</h2>
            <div class="small" data-i18n="maintenance.description">再解析は全件対象・100件ずつ・0.2秒間隔、派生画像補完は全件走査・100件ずつ・0.1秒間隔でバックグラウンド実行します。</div>
          </div>

          <div class="adminGrid">
            <div class="adminCard">
              <h3 data-i18n="maintenance.reparse.title">再解析</h3>
              <div id="reparseSummary" class="maintSummary"></div>

              <div class="row" style="gap:10px; align-items:center; flex-wrap:wrap">
                <button id="startReparseBtn" class="primaryBtn" style="min-width:240px" data-i18n="maintenance.reparse.action">再解析（全件）</button>
                <span id="reparseErr" class="err"></span>
              </div>
              <div id="reparseLockReason" class="small maintHint"></div>

              <div class="maintStateBox">
                <div class="maintStateRow">
                  <div class="maintStateLabel" data-i18n="common.status">状態</div>
                  <div id="reparseStatus" class="maintStateValue"></div>
                </div>

                <div class="maintProgress">
                  <div id="reparseProgressFill" class="maintProgressFill"></div>
                </div>
                <div id="reparseProgressText" class="small maintHint"></div>

                <div class="maintKvGrid">
                  <div class="maintKv"><span class="k" data-i18n="common.started">開始</span><span id="reparseStarted"></span></div>
                  <div class="maintKv"><span class="k" data-i18n="common.updated_at_short">最終更新</span><span id="reparseUpdated"></span></div>
                  <div class="maintKv"><span class="k" data-i18n="common.processed">処理</span><span id="reparseCounts"></span></div>
                  <div class="maintKv"><span class="k" data-i18n="common.cursor">カーソル</span><span id="reparseCursor"></span></div>
                  <div class="maintKv"><span class="k" data-i18n="common.skip">skip</span><span id="reparseSkip"></span></div>
                  <div class="maintKv"><span class="k" data-i18n="common.heartbeat">heartbeat</span><span id="reparseHeartbeat"></span></div>
                </div>
              </div>

              <div class="field" style="margin-top:14px">
                <label data-i18n="common.history_recent_5">履歴（直近5回）</label>
                <div id="reparseHistory" class="maintHistory"></div>
              </div>

              <div style="height:14px"></div>
              <h3 style="margin-top:0" data-i18n="maintenance.rebuild.title">統計</h3>
              <div id="rebuildSummary" class="maintSummary"></div>

              <div class="row" style="gap:10px; align-items:center; flex-wrap:wrap">
                <button id="startRebuildBtn" class="ghostBtn" style="min-width:240px" data-i18n="maintenance.rebuild.action">統計再集計</button>
                <span id="rebuildErr" class="err"></span>
              </div>
              <div id="rebuildLockReason" class="small maintHint"></div>

              <div class="maintStateBox">
                <div class="maintStateRow">
                  <div class="maintStateLabel" data-i18n="common.status">状態</div>
                  <div id="rebuildStatus" class="maintStateValue"></div>
                </div>

                <div class="maintProgress">
                  <div id="rebuildProgressFill" class="maintProgressFill"></div>
                </div>
                <div id="rebuildProgressText" class="small maintHint"></div>

                <div class="maintKvGrid">
                  <div class="maintKv"><span class="k" data-i18n="common.started">開始</span><span id="rebuildStarted"></span></div>
                  <div class="maintKv"><span class="k" data-i18n="common.updated_at_short">最終更新</span><span id="rebuildUpdated"></span></div>
                  <div class="maintKv"><span class="k" data-i18n="common.processed">処理</span><span id="rebuildCounts"></span></div>
                  <div class="maintKv"><span class="k" data-i18n="common.heartbeat">heartbeat</span><span id="rebuildHeartbeat"></span></div>
                </div>
              </div>

              <div class="field" style="margin-top:14px">
                <label data-i18n="common.history_recent_5">履歴（直近5回）</label>
                <div id="rebuildHistory" class="maintHistory"></div>
              </div>

              <div style="height:14px"></div>
              <h3 style="margin-top:0" data-i18n="maintenance.derivative.title">派生画像補完</h3>
              <div id="derivativeFillSummary" class="maintSummary"></div>

              <div class="row" style="gap:10px; align-items:center; flex-wrap:wrap">
                <button id="startDerivativeFillBtn" class="primaryBtn" style="min-width:240px" data-i18n="maintenance.derivative.action">派生画像補完</button>
                <span id="derivativeFillErr" class="err"></span>
              </div>
              <div id="derivativeFillLockReason" class="small maintHint"></div>
              <div class="small maintHint" data-i18n="maintenance.derivative.hint">サムネイル画像とオーバーレイ画像を全件走査し、未作成または利用不能なものを補完します。</div>

              <div class="maintStateBox">
                <div class="maintStateRow">
                  <div class="maintStateLabel" data-i18n="common.status">状態</div>
                  <div id="derivativeFillStatus" class="maintStateValue"></div>
                </div>

                <div class="maintProgress">
                  <div id="derivativeFillProgressFill" class="maintProgressFill"></div>
                </div>
                <div id="derivativeFillProgressText" class="small maintHint"></div>

                <div class="maintKvGrid">
                  <div class="maintKv"><span class="k" data-i18n="common.started">開始</span><span id="derivativeFillStarted"></span></div>
                  <div class="maintKv"><span class="k" data-i18n="common.updated_at_short">最終更新</span><span id="derivativeFillUpdated"></span></div>
                  <div class="maintKv"><span class="k" data-i18n="common.processed">処理</span><span id="derivativeFillCounts"></span></div>
                  <div class="maintKv"><span class="k" data-i18n="common.cursor">カーソル</span><span id="derivativeFillCursor"></span></div>
                  <div class="maintKv"><span class="k" data-i18n="maintenance.label.grid_missing">サムネ不足</span><span id="derivativeFillMissingGrid"></span></div>
                  <div class="maintKv"><span class="k" data-i18n="maintenance.label.overlay_missing">オーバーレイ不足</span><span id="derivativeFillMissingOverlay"></span></div>
                  <div class="maintKv"><span class="k" data-i18n="common.heartbeat">heartbeat</span><span id="derivativeFillHeartbeat"></span></div>
                </div>
              </div>

              <div class="field" style="margin-top:14px">
                <label data-i18n="common.history_recent_5">履歴（直近5回）</label>
                <div id="derivativeFillHistory" class="maintHistory"></div>
              </div>

              <div class="field" style="margin-top:14px">
                <label data-i18n="common.failures_recent_100">失敗（直近100件）</label>
                <div id="derivativeFillErrors" class="maintHistory"></div>
              </div>
            </div>

            <div class="adminCard adminGrow">
              <h3 style="margin-top:0"><span data-i18n="maintenance.errors.reparse_recent">再解析失敗一覧（最新100件）</span> <span id="reparseSkippedLabel" class="small" style="opacity:.85"></span></h3>
              <div class="adminTableWrap">
                <table class="adminTable">
                  <thead>
                    <tr>
                      <th style="width:110px">image_id</th>
                      <th data-i18n="common.error">error</th>
                      <th style="width:160px" data-i18n="common.time">time</th>
                      <th style="width:220px" data-i18n="common.operation">操作</th>
                    </tr>
                  </thead>
                  <tbody id="reparseErrTbody"></tbody>
                </table>
              </div>
            </div>
          </div>

        </div>
      </section>
    </main>
  </div>

  <script type="module" src="/lib/page-i18n.js"></script>
  <script type="module" src="/maintenance.js"></script>
</body>
</html>
