<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title data-i18n="page.settings.title">Settings - NIM</title>
  <link rel="stylesheet" href="/styles.css?v=44" />
</head>
<body class="pageSettings">
  <div class="bg"></div>

  <div class="app">
    <header class="topbar">
      <div class="topbarInner">
        <div class="brand" style="cursor:pointer" onclick="location.assign('/')">
          <svg class="logo" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 2c3.2 0 5.9 1.8 7.2 4.4.4.8 0 1.7-.9 2.1l-2.6 1.2c-.8.4-1.7 0-2.1-.9C13 7.8 12.1 7.2 12 7.2c-1.5 0-2.8 1.3-2.8 2.8v1.2h1.6c.9 0 1.6.7 1.6 1.6v2.4c0 .9-.7 1.6-1.6 1.6H9.2V20c0 1.1-.9 2-2 2H6c-1.1 0-2-.9-2-2v-6.4c0-3.8 0-4.1.1-4.6C4.6 5.1 8 2 12 2Z" fill="currentColor" opacity=".92"/>
            <path d="M20 12.2v6.2c0 1.1-.9 2-2 2h-6.1c-.9 0-1.6-.7-1.6-1.6v-2.4c0-.9.7-1.6 1.6-1.6h3.2v-2.6c0-.9.7-1.6 1.6-1.6h1.7c.9 0 1.6.7 1.6 1.6Z" fill="currentColor" opacity=".65"/>
          </svg>
          <div class="brandText">
            <div class="brandTitle">NIM</div>
          </div>
        </div>

        <nav class="menu" aria-label="main">
          <button class="tab" onclick="location.assign('/')"><span data-i18n="common.back">戻る</span><i class="tabGlow"></i></button>
          <button class="tab active"><span data-i18n="menu.settings">個人設定</span><i class="tabGlow"></i></button>
        </nav>

        <div class="right">
          <div class="userBox">
            <span id="meLabel" class="me"></span>
          </div>

          <button id="hamburger" class="iconBtn" data-i18n-title="menu.title" data-i18n-aria-label="menu.title">
            <span class="icon">☰</span>
          </button>

          <div id="userMenu" class="menuPopup hidden" role="menu" data-i18n-aria-label="menu.user">
            <button id="menuAdmin" class="menuItem hidden" role="menuitem" data-i18n="menu.admin">アカウント管理</button>
            <button id="menuMaintenance" class="menuItem hidden" role="menuitem" data-i18n="menu.maintenance">メンテナンス</button>
            <button id="menuSettings" class="menuItem" role="menuitem" data-i18n="menu.settings">個人設定</button>
            <button id="menuPwLink" class="menuItem" role="menuitem" data-i18n="menu.password">パスワード変更</button>
            <button id="menuLogout" class="menuItem" role="menuitem" data-i18n="menu.logout">ログアウト</button>
          </div>
        </div>
      </div>
    </header>

    <main class="main shell">
      <section class="panel">
        <div class="card">
          <div class="panelTitleRow">
            <h2 data-i18n="menu.settings">個人設定</h2>
            <div class="small" data-i18n="settings.description">共有設定、ブックマークリスト、アカウント削除を管理します。</div>
          </div>

          <div class="row" style="margin-top:10px; gap:14px; flex-wrap:wrap">
            <div class="toolItem" style="min-width:220px">
              <label data-i18n="settings.share_works">個人作品の共有</label>
              <div class="toggleRow">
                <button id="toggleShareWorks" class="toggle off" type="button">OFF</button>
              </div>
            </div>
            <div class="toolItem" style="min-width:220px">
              <label data-i18n="settings.share_bookmarks">ブックマークの共有</label>
              <div class="toggleRow">
                <button id="toggleShareBookmarks" class="toggle off" type="button">OFF</button>
              </div>
            </div>
          
            <div class="toolItem" style="min-width:220px">
              <label data-i18n="settings.language">表示言語</label>
              <div class="toggleRow">
                <select id="uiLanguage" class="miniSelect">
                  <option value="auto" data-i18n="settings.language.auto">ブラウザ設定に従う</option>
                  <option value="ja" data-i18n="settings.language.ja">日本語</option>
                  <option value="en" data-i18n="settings.language.en">English</option>
                </select>
              </div>
            </div>
          </div>

          <div class="row" style="margin-top:10px; flex-wrap:wrap">
            <input id="newListName" class="search" data-i18n-placeholder="settings.list.new_name" style="flex:1 1 220px" />
            <button id="createListBtn" class="primaryBtn" data-i18n="common.create">作成</button>
          </div>

          <div id="settingsStatus" class="small" style="margin-top:8px"></div>

          <div id="bmManageList" class="bmManageList"></div>

          <div class="accountDangerBox">
            <div class="accountDangerTitle" data-i18n="settings.account.delete.title">アカウント削除</div>
            <div id="accountDeleteNote" class="small" data-i18n="settings.account.delete.note">作品、ブックマーク、関連データも削除します。</div>
            <div class="row" style="margin-top:10px; justify-content:flex-end">
              <button id="deleteMyAccountBtn" class="dangerBtn" type="button" data-i18n="settings.account.delete.action">自分のアカウントを削除</button>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="/lib/page-i18n.js"></script>
  <script type="module" src="/settings.js"></script>
</body>
</html>
